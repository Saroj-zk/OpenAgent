title = "SAW gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Allow placeholder/example values in example env files and docs"
paths = [
  '''(^|/)\.env\.example$''',
  '''(^|/)admin-portal/\.env\.example$''',
  '''(^|/)marketplace-app/\.env\.example$''',
  '''(^|/)marketplace-app/server/\.env\.example$''',
  '''(^|/)DEPLOYMENT\.md$''',
  '''(^|/)deploy/runbooks/.*\.md$'''
]
regexes = [
  '''replace-with-[a-z0-9-]+''',
  '''your-[a-z0-9-]+\.example\.com''',
  '''mongodb\+srv://<user>:<password>@<cluster>/<database>\?retryWrites=true&w=majority'''
]
